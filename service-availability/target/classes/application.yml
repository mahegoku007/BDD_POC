server:
  port: 8082

spring:
  application:
    name: service-availability

  # ── H2 in-memory datasource ────────────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:availabilitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop       # schema created on start, dropped on shutdown
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── H2 console (accessible at http://localhost:8082/h2-console during dev) ─
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── RabbitMQ connection ────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Wait up to 30 s for RabbitMQ to accept the TCP connection (K8s startup)
    connection-timeout: 30000
    listener:
      simple:
        # Retry failed messages up to 3 times before sending to DLX
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0

  # ── Jackson ────────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ── Management / Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.classroom.availability: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG

