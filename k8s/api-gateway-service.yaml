# LoadBalancer – exposes gateway on localhost:8080 (Rancher Desktop binds automatically)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: classroom-booking
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: LoadBalancer



