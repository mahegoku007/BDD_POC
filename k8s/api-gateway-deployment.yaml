# ─────────────────────────────────────────────────────────────────────────────
# API Gateway (Apache Camel) – port 8080
#
# Rancher Desktop (containerd mode):
#   nerdctl build -t classroom/api-gateway:latest ./api-gateway-camel
# Rancher Desktop (dockerd mode):
#   docker build -t classroom/api-gateway:latest ./api-gateway-camel
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: classroom-booking
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 2   # scale horizontally; stateless
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: classroom/api-gateway:latest
          imagePullPolicy: IfNotPresent   # Rancher Desktop: image is built locally into containerd/dockerd
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: classroom-config
          env:
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

