# ClusterIP – internal AMQP access for all microservices
# DNS: rabbitmq-service.classroom-booking.svc.cluster.local:5672
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: classroom-booking
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: messaging
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
  type: ClusterIP
---
# NodePort – exposes the management UI outside the cluster for dev/ops
# Access: http://<node-ip>:30672  (guest / guest)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management-svc
  namespace: classroom-booking
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: messaging-ui
spec:
  selector:
    app: rabbitmq
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 30672
  type: NodePort

