# ─────────────────────────────────────────────────────────────────────────────
# MongoDB Secret
# Contains credentials for MongoDB authentication.
# Used by: mongodb-deployment, service-audit
#
# To generate base64 values:
#   echo -n 'audituser' | base64     → YXVkaXR1c2Vy
#   echo -n 'auditpass123' | base64  → YXVkaXRwYXNzMTIz
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: classroom-booking
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
type: Opaque
data:
  MONGO_USERNAME: YXVkaXR1c2Vy          # audituser
  MONGO_PASSWORD: YXVkaXRwYXNzMTIz      # auditpass123
  # Full URI with embedded credentials for Spring Data MongoDB
  # mongodb://audituser:auditpass123@mongodb-service:27017/classroom_audit?authSource=admin
  MONGO_URI: bW9uZ29kYjovL2F1ZGl0dXNlcjphdWRpdHBhc3MxMjNAbW9uZ29kYi1zZXJ2aWNlOjI3MDE3L2NsYXNzcm9vbV9hdWRpdD9hdXRoU291cmNlPWFkbWlu

