# ── Test profile for service-notification ─────────────────────────────────
# Activated by @ActiveProfiles("test").
# Excludes RabbitMQ auto-configuration so tests run without a live broker.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

logging:
  level:
    root: WARN
    com.classroom.notification: DEBUG

